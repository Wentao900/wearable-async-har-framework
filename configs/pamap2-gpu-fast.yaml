project:
  name: wearable-async-har-framework

data:
  dataset: pamap2
  root: data/PAMAP2
  # Slightly larger context than the safe starter config.
  window_size: 320
  stride: 160
  modalities:
    - accelerometer
    - gyroscope
  simulate_asynchrony: false
  timestamp_jitter_ms: 0
  packet_loss_prob: 0.0
  seed: 7

model:
  encoder: tcn
  # More aggressive starter setting for a 4090D.
  hidden_dim: 192
  fusion: gated
  alignment_strategy: nearest-neighbor
  reference_timeline_strategy: densest
  use_timestamp_embedding: false
  use_missingness_mask: true
  num_classes: 13

training:
  # Faster throughput if the dataset layout and driver stack are healthy.
  batch_size: 256
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  modality_dropout_prob: 0.0

runtime:
  device: cuda
  num_workers: 12

logging:
  output_dir: outputs/pamap2-gpu-fast
