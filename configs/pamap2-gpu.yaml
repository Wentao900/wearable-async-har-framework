project:
  name: wearable-async-har-framework

data:
  dataset: pamap2
  root: data/PAMAP2
  # Backward-compatible default GPU config. Prefer pamap2-gpu-safe.yaml or pamap2-gpu-fast.yaml.
  window_size: 256
  stride: 128
  modalities:
    - accelerometer
    - gyroscope
  # Same starter split control as the CPU config; change freely for your setup.
  train_subjects: [101, 102, 103, 104, 105, 106]
  val_subjects: [107]
  test_subjects: [108, 109]
  simulate_asynchrony: false
  timestamp_jitter_ms: 0
  packet_loss_prob: 0.0
  seed: 7

model:
  encoder: tcn
  hidden_dim: 128
  fusion: gated
  alignment_strategy: nearest-neighbor
  reference_timeline_strategy: densest
  use_timestamp_embedding: false
  use_missingness_mask: true
  num_classes: 18

training:
  batch_size: 128
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  modality_dropout_prob: 0.0

runtime:
  device: cuda
  num_workers: 8

logging:
  output_dir: outputs/pamap2-gpu
