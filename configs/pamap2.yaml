project:
  name: wearable-async-har-framework

data:
  dataset: pamap2
  root: data/PAMAP2
  window_size: 256
  stride: 128
  modalities:
    - accelerometer
    - gyroscope
  # Starter subject-wise split control. Adjust these lists for your own experiments.
  # If you remove them, the loader falls back to the older automatic file-order split.
  train_subjects: [101, 102, 103, 104, 105, 106]
  val_subjects: [107]
  test_subjects: [108, 109]
  simulate_asynchrony: false
  timestamp_jitter_ms: 0
  packet_loss_prob: 0.0
  seed: 7

model:
  encoder: tcn
  hidden_dim: 64
  fusion: gated
  alignment_strategy: nearest-neighbor
  reference_timeline_strategy: densest
  use_timestamp_embedding: false
  use_missingness_mask: true
  num_classes: 18

training:
  batch_size: 16
  epochs: 3
  learning_rate: 0.001
  weight_decay: 0.0001
  modality_dropout_prob: 0.0

runtime:
  device: cpu
  num_workers: 0

logging:
  output_dir: outputs/pamap2
