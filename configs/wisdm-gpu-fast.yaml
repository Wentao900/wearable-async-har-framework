project:
  name: wearable-async-har-framework

data:
  dataset: wisdm
  root: data/WISDM
  # Slightly longer windows and a larger hidden size for faster 4090D experiments.
  window_size: 160
  stride: 80
  modalities:
    - accelerometer

model:
  encoder: tcn
  hidden_dim: 192
  fusion: mean
  alignment_strategy: nearest-neighbor
  reference_timeline_strategy: densest
  use_timestamp_embedding: true
  use_missingness_mask: true
  num_classes: 6

training:
  batch_size: 512
  epochs: 25
  learning_rate: 0.001
  weight_decay: 0.0001
  modality_dropout_prob: 0.0

runtime:
  device: cuda
  num_workers: 12

logging:
  output_dir: outputs/wisdm-gpu-fast
