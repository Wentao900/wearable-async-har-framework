project:
  name: wearable-async-har-framework

data:
  dataset: wisdm
  root: data/WISDM
  window_size: 128
  stride: 64
  modalities:
    - accelerometer

model:
  encoder: tcn
  hidden_dim: 128
  fusion: mean
  alignment_strategy: nearest-neighbor
  reference_timeline_strategy: densest
  use_timestamp_embedding: true
  use_missingness_mask: true
  num_classes: 6

training:
  batch_size: 256
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  modality_dropout_prob: 0.0

runtime:
  device: cuda
  num_workers: 8

logging:
  output_dir: outputs/wisdm-gpu
